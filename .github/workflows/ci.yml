name: CI

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --config Debug

      - name: Test
        run: ctest -C Debug --test-dir build --output-on-failure

      - name: Perf Soft Gate
        shell: pwsh
        run: |
          ./tools/perf/run_stress.ps1 -BuildDir build -Config Debug -SoftThresholdEnabled $true

      - name: Upload Perf Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-${{ matrix.os }}
          path: build/artifacts/perf/*
          if-no-files-found: ignore

