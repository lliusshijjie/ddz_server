name: CI

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --config Debug

      - name: Start Docker services
        run: docker compose up -d

      - name: Wait for Docker services
        shell: pwsh
        run: |
          $deadline = (Get-Date).AddMinutes(2)
          while ((Get-Date) -lt $deadline) {
            $mysql = docker inspect -f "{{.State.Health.Status}}" ddz_mysql 2>$null
            $redis = docker inspect -f "{{.State.Health.Status}}" ddz_redis 2>$null
            if ($mysql -eq "healthy" -and $redis -eq "healthy") {
              exit 0
            }
            Start-Sleep -Seconds 5
          }
          throw "Docker services did not become healthy within 2 minutes"

      - name: Test
        run: ctest -C Debug --test-dir build --output-on-failure

      - name: Perf Soft Gate
        shell: pwsh
        run: |
          ./tools/perf/run_stress.ps1 -BuildDir build -Config Debug -SoftThresholdEnabled $true

      - name: Upload Perf Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-${{ matrix.os }}
          path: build/artifacts/perf/*
          if-no-files-found: ignore
