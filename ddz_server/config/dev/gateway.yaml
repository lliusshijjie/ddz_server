gateway:
  listen_host: 0.0.0.0
  listen_port: 9010
  upstream_host: 127.0.0.1
  upstream_port: 9000
  max_packet_size: 65536
  heartbeat_timeout_ms: 30000
  reconnect_backoff_ms: 1000
  dev_key: "dev_gateway_key"

auth:
  token_secret: "dev_change_me"
  token_ttl_seconds: 604800

log:
  level: info
  dir: ./logs

security:
  allowed_origins:
    - "http://localhost:5173"
    - "http://127.0.0.1:5173"
  max_ws_connections_per_ip: 64
  max_ws_messages_per_sec: 60
  max_http_qps_per_ip: 30
  ban_seconds_on_abuse: 30
  trust_x_forwarded_for: false

observability:
  enable_structured_log: true
  metrics_report_interval_ms: 30000
